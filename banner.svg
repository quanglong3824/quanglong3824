<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&amp;family=Space+Grotesk:wght@500&amp;display=swap');
      .name {
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 42px;
        fill: url(#name-gradient);
        filter: drop-shadow(0px 4px 8px rgba(99, 102, 241, 0.4));
      }
      .title {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 18px;
        fill: #A5B4FC;
        letter-spacing: 3px;
      }
      .highlight {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 13px;
        fill: #38BDF8;
        letter-spacing: 1.5px;
      }
      .grid {
        stroke: rgba(99, 102, 241, 0.08);
        stroke-width: 1;
      }
      .pulse-circle {
        animation: pulse 4s infinite alternate;
      }
      @keyframes pulse {
        0% { opacity: 0.3; transform: scale(0.98); }
        100% { opacity: 0.7; transform: scale(1.02); }
      }
    </style>
    
    <!-- Gradients -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090A0F" />
      <stop offset="50%" stop-color="#0E1328" />
      <stop offset="100%" stop-color="#04060E" />
    </linearGradient>
    
    <linearGradient id="name-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" /> <!-- Indigo -->
      <stop offset="50%" stop-color="#34D399" /> <!-- Emerald -->
      <stop offset="100%" stop-color="#38BDF8" /> <!-- Cyan -->
    </linearGradient>

    <linearGradient id="circle-gradient-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="circle-gradient-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-indigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="250" fill="url(#bg-gradient)" rx="16"/>
  
  <!-- Tech Grid Background -->
  <g class="grid">
    <!-- Vertical lines -->
    <line x1="50" y1="0" x2="50" y2="250" />
    <line x1="100" y1="0" x2="100" y2="250" />
    <line x1="150" y1="0" x2="150" y2="250" />
    <line x1="200" y1="0" x2="200" y2="250" />
    <line x1="250" y1="0" x2="250" y2="250" />
    <line x1="300" y1="0" x2="300" y2="250" />
    <line x1="350" y1="0" x2="350" y2="250" />
    <line x1="400" y1="0" x2="400" y2="250" />
    <line x1="450" y1="0" x2="450" y2="250" />
    <line x1="500" y1="0" x2="500" y2="250" />
    <line x1="550" y1="0" x2="550" y2="250" />
    <line x1="600" y1="0" x2="600" y2="250" />
    <line x1="650" y1="0" x2="650" y2="250" />
    <line x1="700" y1="0" x2="700" y2="250" />
    <line x1="750" y1="0" x2="750" y2="250" />
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
  </g>
  
  <!-- Glowing Tech Orbs -->
  <circle cx="700" cy="80" r="140" fill="url(#circle-gradient-1)" />
  <circle cx="100" cy="180" r="100" fill="url(#circle-gradient-2)" />
  
  <!-- Decorative Circuits/Nodes -->
  <g opacity="0.3">
    <!-- Circuit lines -->
    <path d="M 620,60 L 680,60 L 710,90 L 760,90" fill="none" stroke="#818CF8" stroke-width="2" stroke-dasharray="4 4" />
    <path d="M 650,200 L 720,200 L 740,180 M 720,200 L 730,210" fill="none" stroke="#34D399" stroke-width="1.5" />
    <!-- Nodes -->
    <circle cx="620" cy="60" r="4" fill="#818CF8" />
    <circle cx="760" cy="90" r="4" fill="#38BDF8" />
    <circle cx="650" cy="200" r="3" fill="#34D399" />
    <circle cx="740" cy="180" r="3" fill="#34D399" />
    <circle cx="730" cy="210" r="3" fill="#34D399" />
  </g>

  <!-- Title / Branding Content -->
  <g transform="translate(60, 0)">
    <!-- Decorative mini tagline -->
    <text x="0" y="80" class="highlight">&lt; HELLO WORLD &gt;</text>
    
    <!-- Personal Brand Name -->
    <text x="0" y="130" class="name">LE QUANG LONG</text>
    
    <!-- Title / Domain -->
    <text x="0" y="170" class="title">FULLSTACK DEVELOPER &amp; AI INTEGRATION</text>
    
    <!-- Dynamic Tech Vibe Tag -->
    <g transform="translate(0, 195)" opacity="0.8">
      <!-- Coding tag -->
      <rect x="0" y="0" width="135" height="24" rx="12" fill="#1E1B4B" stroke="#4F46E5" stroke-width="1"/>
      <text x="67.5" y="16" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#C7D2FE" text-anchor="middle">#AI_Vibe_Coding</text>
      
      <!-- Automation tag -->
      <rect x="145" y="0" width="135" height="24" rx="12" fill="#064E3B" stroke="#059669" stroke-width="1"/>
      <text x="212.5" y="16" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#A7F3D0" text-anchor="middle">#Process_Automation</text>

      <!-- UI/UX tag -->
      <rect x="290" y="0" width="115" height="24" rx="12" fill="#172554" stroke="#2563EB" stroke-width="1"/>
      <text x="347.5" y="16" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#BFDBFE" text-anchor="middle">#Modern_UI_UX</text>
    </g>
  </g>
  
  <!-- Right edge abstract glowing bar -->
  <path d="M 795,40 L 795,210" stroke="url(#name-gradient)" stroke-width="6" stroke-linecap="round" filter="url(#glow-indigo)" />
</svg>
